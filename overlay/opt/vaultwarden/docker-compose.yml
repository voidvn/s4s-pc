# Vaultwarden — self-hosted, Bitwarden-compatible password manager.
# Web vault reachable at http://localhost:8080 once the container is up.
# Data persists in /opt/vaultwarden/data (on an INSTALLED system; in a LIVE
# session that path lives in the RAM overlay and is lost on shutdown).
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      # Allow creating the first account from the web vault. Once you have your
      # account you may want to set this to "false" (edit + `docker compose up -d`).
      SIGNUPS_ALLOWED: "true"
      # Real-time sync for the browser/desktop clients.
      WEBSOCKET_ENABLED: "true"
      # To expose on the LAN over HTTPS, set a domain + put a reverse proxy in
      # front, or mount certs and set ROCKET_TLS. Localhost HTTP is fine to start.
    volumes:
      - /opt/vaultwarden/data:/data
    ports:
      - "8080:80"
