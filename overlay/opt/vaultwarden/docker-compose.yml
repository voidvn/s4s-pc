# Vaultwarden — self-hosted, Bitwarden-compatible password manager.
# Web vault at http://localhost:8080 once up. Data persists in
# /opt/vaultwarden/data (on an INSTALLED system; in a LIVE session it is RAM).
#
# The env below is set up so you can later create an Organization + Collection
# and share decoy logins to 'worker' with the "Hide Passwords" permission
# (autofill works, reveal/copy blocked). See provision.sh and docs/HARDENING.md.
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "http://localhost:8080"
      SIGNUPS_ALLOWED: "true"        # lock to "false" after creating your owner account
      INVITATIONS_ALLOWED: "true"
      ORG_CREATION_USERS: "all"
      WEBSOCKET_ENABLED: "true"
      # ADMIN_TOKEN: set an Argon2 PHC hash to enable the /admin panel.
    volumes:
      - /opt/vaultwarden/data:/data
    ports:
      - "8080:80"
