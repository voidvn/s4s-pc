# Live-session identity. casper autologins this user in the live session.
# We point it at 'worker' (the locked, non-admin account). casper may still try
# to grant it sudo at boot — s4s-lock-worker.service strips that back off.
export USERNAME="worker"
export USERFULLNAME="Worker"
export HOST="s4s-pc"
export BUILD_SYSTEM="Ubuntu"
