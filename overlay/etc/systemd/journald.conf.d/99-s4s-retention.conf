# Persistent journald with ~6-month (26-week) retention for logins/sessions/
# system logs that complement auditd. Requires /var/log/journal to exist
# (created in chroot-setup.sh).
[Journal]
Storage=persistent
Compress=yes
Seal=yes
MaxRetentionSec=15768000
SystemMaxUse=4G
SystemKeepFree=1G
SystemMaxFileSize=256M
SystemMaxFiles=200
MaxFileSec=1month
ForwardToSyslog=no
