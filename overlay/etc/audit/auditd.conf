# /etc/audit/auditd.conf — tuned for ~6-month retention, workstation-safe.
# Strategy: keep_logs (never auto-delete) + logrotate maxage 183 bounds disk.
log_file = /var/log/audit/audit.log
write_logs = yes
log_format = ENRICHED
log_group = adm
flush = incremental_async
freq = 50

max_log_file = 64
num_logs = 200
# keep_logs never overwrites/deletes old logs; disk is bounded by logrotate.
max_log_file_action = keep_logs

# Disk-pressure actions: warn, NEVER freeze/halt a workstation.
space_left = 2048
space_left_action = syslog
verify_email = yes
action_mail_acct = root
admin_space_left = 1024
admin_space_left_action = syslog
disk_full_action = syslog
disk_error_action = syslog

name_format = hostname
max_restarts = 10
overflow_action = syslog
